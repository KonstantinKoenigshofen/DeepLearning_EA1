<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Image Classification mit ml5</title>
  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .image-column, .chart-column {
      width: 50%;
    }

    img {
      max-width: 100%;
      margin-bottom: 10px;
    }

    .section {
      margin-bottom: 50px;
    }

    .correct {
      border: 3px solid green;
    }

    .wrong {
      border: 3px solid red;
    }
  </style>
</head>
<body>

<h1>Bilderkennung mit ml5.js</h1>

<!-- RICHTIGE KLASSIFIKATION -->
<div class="section">
  <h2>Richtig klassifizierte Bilder</h2>

  <div class="container">
    <div class="image-column">
      <img src="img/correct1.jpg" class="correct">
      <img src="img/correct2.jpg" class="correct">
      <img src="img/correct3.jpg" class="correct">
    </div>

    <div class="chart-column">
      <canvas id="chartCorrect"></canvas>
    </div>
  </div>
</div>

<!-- FALSCHE KLASSIFIKATION -->
<div class="section">
  <h2>Falsch klassifizierte Bilder</h2>

  <div class="container">
    <div class="image-column">
      <img src="img/wrong1.jpg" class="wrong">
      <img src="img/wrong2.jpg" class="wrong">
      <img src="img/wrong3.jpg" class="wrong">
    </div>

    <div class="chart-column">
      <canvas id="chartWrong"></canvas>
    </div>
  </div>
</div>

<!-- USER UPLOAD -->
<div class="section">
  <h2>Eigenes Bild hochladen</h2>

  <input type="file" id="upload">
  <br><br>
  <img id="preview">
  <br><br>
  <button onclick="classifyImage()">Classify</button>

  <canvas id="chartUser"></canvas>
</div>

<!-- DISKUSSION -->
<div class="section">
  <h2>Diskussion</h2>
  <p>
    <!-- Hier später deine Analyse einfügen -->
  </p>
</div>

<!-- DOKUMENTATION -->
<div class="section">
  <h2>Dokumentation</h2>
  <p>
    <!-- Technisch + Fachlich -->
  </p>
</div>

<script src="script.js"></script>

</body>
</html>
