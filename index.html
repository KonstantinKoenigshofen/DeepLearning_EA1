<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Image Classification mit ml5</title>
  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Bilderkennung mit ml5.js</h1>

<!-- RICHTIGE KLASSIFIKATION -->
<div class="section">
  <h2>Richtig klassifizierte Bilder</h2>

    <div class="container">
        <div class="image-column">
            <img id="Papagei" src="Bilder/Papagei.jpg" class="correct">
        </div>

        <div class="chart-column">
            <canvas id="chartPapagei"></canvas>
        </div>
    </div>

    <div class="container">
        <div class="image-column">
            <img id="Pizza" src="Bilder/Pizza.jpg" class="correct">
        </div>

        <div class="chart-column">
            <canvas id="chartPizza"></canvas>
        </div>
    </div>

    <div class="container">
        <div class="image-column">
            <img id="Burger" src="Bilder/Burger.jpg" class="correct">
        </div>

        <div class="chart-column">
            <canvas id="chartBurger"></canvas>
        </div>
    </div>


</div>

<!-- FALSCHE KLASSIFIKATION -->
<div class="section">
  <h2>Falsch klassifizierte Bilder</h2>

    <div class="container">
        <div class="image-column">
            <img id="Heckenbraunelle" src="Bilder/Heckenbraunelle.jpg" class="correct">
        </div>

        <div class="chart-column">
            <canvas id="chartHeckenbraunelle"></canvas>
        </div>
    </div>

    <div class="container">
        <div class="image-column">
            <img id="Löwenzahn" src="Bilder/Löwenzahn.jpg" class="correct">
        </div>

        <div class="chart-column">
            <canvas id="chartLöwenzahn"></canvas>
        </div>
    </div>

    <div class="container">
        <div class="image-column">
            <img id="Hausratte" src="Bilder/Hausratte.jpg" class="correct">
        </div>

        <div class="chart-column">
            <canvas id="chartHausratte"></canvas>
        </div>
    </div>

</div>

<!-- USER UPLOAD -->
<div class="section">
  <h2>Eigenes Bild hochladen</h2>

  <div id="dropzone">
    <p>Bild hier hineinziehen oder klicken zum Auswählen</p>
    <input type="file" id="upload" accept="image/*">
  </div>

  <br>
  <img id="preview">

  <br><br>
  <button onclick="classifyUserImage()">Klassifizieren</button>

  <canvas id="chartUser"></canvas>
</div>

<!-- DISKUSSION -->
<div class="section">
  <h2>Diskussion</h2>
  <p>
    <!-- Hier später deine Analyse einfügen -->
  </p>
</div>

<!-- DOKUMENTATION -->
<div class="section">
  <h2>Dokumentation</h2>
  <p>
    <!-- Technisch + Fachlich -->
  </p>
</div>

<script src="script.js"></script>

</body>
</html>
